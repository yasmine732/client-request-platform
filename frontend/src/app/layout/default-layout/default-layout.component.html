<!-- Barre latérale -->
<c-sidebar
  #sidebar1="cSidebar"
  class="d-print-none sidebar sidebar-fixed border-end"
  colorScheme="dark"
  id="sidebar1"
  visible
>

  <!-- Logo ClientFlow -->
  <c-sidebar-header class="border-bottom">

    <c-sidebar-brand
      [routerLink]="['/dashboard']"
      class="clientflow-brand"
    >

      <div class="clientflow-logo">
        CF
      </div>

      <div class="clientflow-brand-text sidebar-brand-full">

        <span class="clientflow-name">
          ClientFlow
        </span>

        <small>
          Suivi des demandes
        </small>

      </div>

    </c-sidebar-brand>

  </c-sidebar-header>

  <!-- Menu -->
  <ng-scrollbar
    pointerEventsMethod="scrollbar"
    visibility="hover"
  >
    <c-sidebar-nav
      [navItems]="navItems"
      dropdownMode="close"
      compact
    />
  </ng-scrollbar>

  <!-- Bouton pour réduire la barre -->
  @if (!sidebar1.narrow) {
    <c-sidebar-footer
      cSidebarToggle="sidebar1"
      class="border-top d-none d-lg-flex"
      toggle="unfoldable"
      style="cursor: pointer;"
    >
      <button
        cSidebarToggler
        aria-label="Réduire la barre latérale"
      ></button>
    </c-sidebar-footer>
  }

</c-sidebar>

<!-- Partie principale -->
<div class="wrapper d-flex flex-column min-vh-100">

  <!-- En-tête -->
  <app-default-header
    [cShadowOnScroll]="'sm'"
    class="mb-4 d-print-none header header-sticky p-0 shadow-sm"
    position="sticky"
    sidebarId="sidebar1"
  />

  <!-- Contenu des pages -->
  <div class="body flex-grow-1">

    <c-container
      breakpoint="lg"
      class="h-auto px-4"
    >
      <router-outlet />
    </c-container>

  </div>

</div>
